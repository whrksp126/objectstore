# /srv/nginx-proxy/conf.d/objectstore.conf
# Cloudflare(HTTPS, Proxied) → 공유기 → nginx_proxy(80/443) → objectstore_minio_prod
# - API 도메인: S3 SDK / aws-cli endpoint
# - Console 도메인: 사람이 쓰는 Web UI (websocket 업그레이드 필요)
# 인증서는 다른 서비스(serverstate/heyvoca/openday/orderandgo)들과 동일한 Cloudflare Origin Cert 사용.

# ───────── API (S3 endpoint) ─────────
server {
    listen 80;
    listen 443 ssl;
    server_name objectstore.ghmate.com;
    ssl_certificate /etc/nginx/certs/cloudflare_chain.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    # MinIO 권장: 큰 파일 PUT 대비 업로드 제한 해제, 버퍼링 끄기
    client_max_body_size 5G;
    ignore_invalid_headers off;
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_pass http://objectstore_minio_prod:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        chunked_transfer_encoding off;
    }
}

# ───────── Console (Web UI) ─────────
server {
    listen 80;
    listen 443 ssl;
    server_name objectstore-console.ghmate.com;
    ssl_certificate /etc/nginx/certs/cloudflare_chain.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    client_max_body_size 5G;
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_pass http://objectstore_minio_prod:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy true;
        real_ip_header X-Real-IP;
        proxy_connect_timeout 300;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        chunked_transfer_encoding off;
    }
}
